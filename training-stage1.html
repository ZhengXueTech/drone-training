const QUIZ_SIZE = 5;
const PASS_THRESHOLD = 4; // 5 題對 4 題以上算及格

// ---------------------------------------------------------
// 狀態
// ---------------------------------------------------------
let checkedSet = new Set();
let currentQuiz = [];
let quizIndex = 0;
let quizAnswers = [];
let quizLocked = false;

const STORAGE_KEY = 'training-stage1-progress';


// ---------------------------------------------------------
// 初始化
// ---------------------------------------------------------
window.onload = async function () {
    renderChecklist();
    await loadProgress();
    updateOverallProgress();
};

function gasGetProgress(storageKey) {
    return new Promise((resolve) => {
        try {
            const raw = localStorage.getItem(storageKey);
            resolve(raw ? JSON.parse(raw) : null);
        } catch(e) { resolve(null); }
    });
}


async function loadProgress() {
    const data = await gasGetProgress(STORAGE_KEY);
    if (data && data.checklistDone) {
        checkedSet = new Set(checklistItems.map(i => i.id));
        renderChecklist();
        document.getElementById('btn-checklist-next').disabled = false;
        document.getElementById('btn-checklist-next').className =
            "mt-3 w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-3 rounded-xl uppercase tracking-widest text-xs transition cursor-pointer";
        document.getElementById('btn-checklist-next').textContent = '已完成 · 繼續前往測驗 →';
    }
}

async function saveProgress(patch) {
    const existing = (await gasGetProgress(STORAGE_KEY)) || {};
    const merged = Object.assign({}, existing, patch);
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    } catch(e) { console.error('儲存進度失敗', e); }
}

function updateOverallProgress() {
    const checklistDone = checkedSet.size === checklistItems.length;
    const quizDone = document.getElementById('screen-pass').classList.contains('hidden') === false;
    const count = (checklistDone ? 1 : 0) + (quizDone ? 1 : 0);
    document.getElementById('overall-progress-text').textContent = `${count} / 2`;
    document.getElementById('overall-progress-fill').style.width = `${(count / 2) * 100}%`;
}

// ---------------------------------------------------------
// 畫面一：檢查清單
// ---------------------------------------------------------
function renderChecklist() {
    const container = document.getElementById('checklist-container');
    container.innerHTML = '';
    checklistItems.forEach(item => {
        const isChecked = checkedSet.has(item.id);
        const el = document.createElement('div');
        el.className = `checklist-item ${isChecked ? 'checked' : ''} flex items-center gap-3 p-3 rounded-xl border border-slate-700/60 bg-slate-900/40`;
        el.innerHTML = `
            <div class="checkbox-box">${isChecked ? '<span class="text-slate-950 font-black text-sm">✓</span>' : ''}</div>
            <div class="text-xl">${item.icon}</div>
            <div class="flex flex-col">
                <span class="text-xs font-bold text-white">${item.title}</span>
                <span class="text-[10px] text-slate-400 font-mono leading-snug">${item.desc}</span>
            </div>
        `;
        el.addEventListener('click', () => toggleCheck(item.id));
        container.appendChild(el);
    });
    document.getElementById('checklist-count').textContent = `${checkedSet.size} / ${checklistItems.length}`;
}

function toggleCheck(id) {
    if (checkedSet.has(id)) checkedSet.delete(id);
    else checkedSet.add(id);
    renderChecklist();

    const btn = document.getElementById('btn-checklist-next');
    const done = checkedSet.size === checklistItems.length;
    btn.disabled = !done;
    btn.textContent = done ? '已完成 · 繼續前往測驗 →' : '完成全部檢查後解鎖測驗';
    btn.className = done
        ? "mt-3 w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-3 rounded-xl uppercase tracking-widest text-xs transition cursor-pointer"
        : "mt-3 w-full bg-slate-800 text-slate-500 font-black py-3 rounded-xl uppercase tracking-widest text-xs transition cursor-not-allowed";

    if (done) saveProgress({ checklistDone: true });
    updateOverallProgress();
}

document.getElementById('btn-checklist-next').addEventListener('click', () => {
    if (checkedSet.size !== checklistItems.length) return;
    startQuiz();
});

// ---------------------------------------------------------
// 畫面二：隨機測驗
// ---------------------------------------------------------
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startQuiz() {
    currentQuiz = shuffle(quizPool).slice(0, QUIZ_SIZE).map(q => {
        // 同時打亂選項順序，避免死記位置
        const optionIndices = shuffle(q.options.map((_, i) => i));
        return {
            category: q.category,
            q: q.q,
            options: optionIndices.map(i => q.options[i]),
            correct: optionIndices.indexOf(q.correct),
            explain: q.explain
        };
    });
    quizIndex = 0;
    quizAnswers = [];

    document.getElementById('screen-checklist').classList.add('hidden');
    document.getElementById('screen-fail').classList.add('hidden');
    document.getElementById('screen-pass').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');

    renderQuizQuestion();
}

function renderQuizQuestion() {
    quizLocked = false;
    const q = currentQuiz[quizIndex];
    document.getElementById('quiz-progress').textContent = `第 ${quizIndex + 1} / ${currentQuiz.length} 題`;
    document.getElementById('quiz-category').textContent = q.category;
    document.getElementById('quiz-question-text').textContent = q.q;

    const optionsContainer = document.getElementById('quiz-options');
    optionsContainer.innerHTML = '';
    q.options.forEach((opt, idx) => {
        const el = document.createElement('div');
        el.className = 'quiz-option flex items-center gap-3 p-3 rounded-xl border border-slate-700/60 bg-slate-900/40 text-xs text-slate-200 font-mono';
        el.innerHTML = `<span class="w-5 h-5 min-w-[20px] rounded-full border border-slate-500 flex items-center justify-center text-[10px] font-bold">${String.fromCharCode(65 + idx)}</span><span>${opt}</span>`;
        el.addEventListener('click', () => selectAnswer(idx));
        optionsContainer.appendChild(el);
    });

    document.getElementById('quiz-explanation').classList.add('hidden');
    const btn = document.getElementById('btn-quiz-next');
    btn.disabled = true;
    btn.textContent = '請先作答';
    btn.className = "mt-2 w-full bg-slate-800 text-slate-500 font-black py-3 rounded-xl uppercase tracking-widest text-xs transition cursor-not-allowed";
}

function selectAnswer(idx) {
    if (quizLocked) return;
    quizLocked = true;
    const q = currentQuiz[quizIndex];
    const isCorrect = idx === q.correct;
    quizAnswers.push(isCorrect);

    const options = document.querySelectorAll('#quiz-options .quiz-option');
    options.forEach((el, i) => {
        el.classList.add('locked');
        if (i === q.correct) el.classList.add('reveal-correct');
        if (i === idx && isCorrect) el.classList.add('selected-correct');
        if (i === idx && !isCorrect) el.classList.add('selected-wrong');
    });

    const explainBox = document.getElementById('quiz-explanation');
    explainBox.classList.remove('hidden');
    explainBox.className = `text-[11px] font-mono leading-relaxed p-3 rounded-lg mt-1 ${isCorrect ? 'bg-emerald-950/50 text-emerald-300 border border-emerald-800' : 'bg-rose-950/50 text-rose-300 border border-rose-800'}`;
    explainBox.textContent = (isCorrect ? '✓ 答對了！' : '✕ 答錯了。') + '　' + q.explain;

    const btn = document.getElementById('btn-quiz-next');
    btn.disabled = false;
    const isLast = quizIndex === currentQuiz.length - 1;
    btn.textContent = isLast ? '查看測驗結果' : '下一題 →';
    btn.className = "mt-2 w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-slate-950 font-black py-3 rounded-xl uppercase tracking-widest text-xs transition cursor-pointer";
}

document.getElementById('btn-quiz-next').addEventListener('click', () => {
    if (quizIndex < currentQuiz.length - 1) {
        quizIndex++;
        renderQuizQuestion();
    } else {
        finishQuiz();
    }
});

async function finishQuiz() {
    const correctCount = quizAnswers.filter(Boolean).length;
    const passed = correctCount >= PASS_THRESHOLD;

    document.getElementById('screen-quiz').classList.add('hidden');

    if (passed) {
        document.getElementById('pass-score-text').textContent = `本次成績：${correctCount} / ${currentQuiz.length} 題正確`;
        document.getElementById('screen-pass').classList.remove('hidden');
        await saveProgress({ quizDone: true, bestScore: correctCount, lastAttempt: new Date().toISOString() });
    } else {
        document.getElementById('fail-score-text').textContent = `本次成績：${correctCount} / ${currentQuiz.length} 題正確（需達 ${PASS_THRESHOLD} 題以上才算及格）`;
        document.getElementById('screen-fail').classList.remove('hidden');
    }
    updateOverallProgress();
}

document.getElementById('btn-retry-quiz').addEventListener('click', () => {
    document.getElementById('screen-fail').classList.add('hidden');
    startQuiz();
});

document.getElementById('btn-restart-all').addEventListener('click', () => {
    document.getElementById('screen-pass').classList.add('hidden');
    startQuiz();
});
</script>
